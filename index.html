<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Play Video Stream</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 12px;
    }
    .container {
      width: 100%;
      max-width: 420px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 36px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.65);
      position: relative;
      overflow: hidden;
    }
    .container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(88,101,242,0.07) 0%, transparent 60%);
      pointer-events: none;
    }
    h1 {
      font-size: clamp(1.8rem, 5.5vw, 2.1rem);
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: -0.5px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 18px 20px;
      margin: 14px 0;
      border-radius: 12px;
      font-size: clamp(0.95rem, 3.8vw, 1.02rem);
      font-weight: 600;
      text-decoration: none;
      text-align: center;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      border: 1px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
      transition: left 0.6s;
    }
    .btn:hover::before {
      left: 100%;
    }
    .link-btn {
      background: #21262d;
      color: #fff;
      border: 1px solid #fff;
    }
    .link-btn:hover {
      background: #2d333b;
      border-color: #6e7681;
    }
    .get-btn {
      background: linear-gradient(90deg, #5865f2, #7289da);
      color: white;
      border: none;
    }
    .get-btn:hover {
      background: linear-gradient(90deg, #4752c4, #5a6eb8);
    }
    .info-text, .no-id-message, .error-text {
      text-align: center;
      color: #8b949e;
      font-size: 0.95rem;
      margin: 16px 0 20px;
      line-height: 1.5;
    }
    .no-id-message, .error-text {
      color: #ff6b6b;
      font-weight: 500;
    }
    #statusText.loading::after {
      content: " ⏳";
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Click Link to Watch</h1>
  
  <a href="https://conductivebreeds.com/hfsryann?key=eaab76900c74fd3d16fe1e0ef86fffaf" 
     class="btn link-btn">Watch Now!</a>
  
  <a href="https://conductivebreeds.com/hfsryann?key=eaab76900c74fd3d16fe1e0ef86fffaf" 
     class="btn link-btn">Alternative Link!</a>
  
  <div id="linkContainer"></div>
  
  <p id="statusText" class="info-text">Checking video ID...</p>
</div>

<script>
  function updateLink() {
    const urlParams = new URLSearchParams(window.location.search);
    const videoId = urlParams.get('id');
    const linkContainer = document.getElementById('linkContainer');
    const statusText = document.getElementById('statusText');

    linkContainer.innerHTML = '';

    if (videoId && videoId.trim() !== '') {
      const cleanId = videoId.replace(/[^a-zA-Z0-9_-]/g, '');
      if (cleanId !== '') {
        // ID valid → tampilkan link langsung seperti semula
        const targetUrl = `https://cdn-videycoi.site/v/?id=${cleanId}`;
        const mp4Display = `https://cdn.videy.co/${cleanId}.mp4`;
        
        linkContainer.innerHTML = `
          <a href="${targetUrl}" class="btn link-btn" target="_blank">
            ${mp4Display}
          </a>
        `;
        statusText.style.display = 'none';
        return;
      }
    }

    // Jika ID tidak ada / invalid → tampilkan tombol Get URL
    statusText.className = 'no-id-message';
    statusText.textContent = 'No valid video ID found. Click below to try get URL.';

    const getBtn = document.createElement('button');
    getBtn.className = 'btn get-btn';
    getBtn.textContent = 'Get Video URL';
    getBtn.onclick = async () => {
      getBtn.disabled = true;
      getBtn.textContent = 'Fetching...';
      statusText.className = 'info-text loading';
      statusText.textContent = 'Trying to retrieve video URL...';

      try {
        // Ganti dengan endpoint fetch yang sebenarnya kalau kamu punya
        // Contoh sementara (harus diganti dengan API real-mu)
        const cleanIdFromInput = prompt("Masukkan video ID (jika tahu):") || cleanId || '';
        if (!cleanIdFromInput) throw new Error("No ID provided");

        const response = await fetch(`https://cdn-videycoi.site/v/?id=${cleanIdFromInput}`, {
          method: 'GET',
          redirect: 'follow'
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const finalUrl = response.url; // ambil URL setelah redirect (jika ada)
        const mp4Url = `https://cdn.videy.co/${cleanIdFromInput}.mp4`;

        // Ganti tombol menjadi link video
        linkContainer.innerHTML = `
          <a href="${finalUrl || mp4Url}" class="btn link-btn" target="_blank">
            ${mp4Url}
          </a>
        `;
        statusText.style.display = 'none';
      } catch (err) {
        console.error(err);
        statusText.className = 'error-text';
        statusText.textContent = 'Failed to get URL. Try again or check the ID.';
        getBtn.disabled = false;
        getBtn.textContent = 'Try Again';
      }
    };

    linkContainer.appendChild(getBtn);
  }

  document.addEventListener('DOMContentLoaded', updateLink);
</script>
