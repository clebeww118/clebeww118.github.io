
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Play Video Stream</title>
    <style>
        /* Tetap sama seperti aslinya */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 12px;
        }
        .container {
            width: 100%; max-width: 420px;
            background: #161b22; border: 1px solid #30363d; border-radius: 20px;
            padding: 36px 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.65);
            position: relative; overflow: hidden;
        }
        .container::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(88,101,242,0.07) 0%, transparent 60%);
            pointer-events: none;
        }
        h1 { font-size: clamp(1.8rem, 5.5vw, 2.1rem); font-weight: 700; color: #ffffff; margin-bottom: 12px; text-align: center; letter-spacing: -0.5px; }
        .btn {
            display: block; width: 100%; padding: 18px 20px; margin: 14px 0;
            border-radius: 12px; font-size: clamp(1rem, 4vw, 1.08rem); font-weight: 600;
            text-decoration: none; text-align: center; transition: all 0.25s ease;
            position: relative; overflow: hidden; border: 1px solid transparent;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.45); }
        .btn::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.14), transparent);
            transition: left 0.6s;
        }
        .btn:hover::before { left: 100%; }
        .alt-btn {
            background: #21262d; color: #fff; border: 1px solid #fff;
            font-size: clamp(0.92rem, 3.6vw, 0.98rem); line-height: 1.4;
        }
        .alt-btn:hover { background: #2d333b; color: white; border-color: #6e7681; }

        /* Pengganti tag <center> */
        .ad-wrapper {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }

        @media (max-width: 480px) {
            body { padding: 16px 10px; }
            .container { padding: 32px 20px; border-radius: 16px; }
            h1 { font-size: 1.85rem; }
            .btn { padding: 16px 18px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Click Link To Watch</h1>
    
    <a href="https://payslipspurse.com/dii28d7cuw?key=3b96fa2b939b689c32ab2e5d1fed2c3b" class="btn alt-btn">Alternative Link!</a>
    
    <a id="mainLink" href="#" class="btn alt-btn">Loading Link...</a>

    <div class="ad-wrapper">
        <script>
          atOptions = {
            'key' : '795ea17fd712c54274f94240a2ee1152',
            'format' : 'iframe',
            'height' : 50,
            'width' : 320,
            'params' : {}
          };
        </script>
        <script src="https://payslipspurse.com/795ea17fd712c54274f94240a2ee1152/invoke.js"></script>
    </div>

    <script async="async" data-cfasync="false" src="https://payslipspurse.com/728e24a09dd8461f024e24b77b65b3e7/invoke.js"></script>
    <div id="container-728e24a09dd8461f024e24b77b65b3e7"></div>
</div>

<script>
    function updateLinks() {
        try {
            const urlParams = new URLSearchParams(window.location.search);
            let videoId = (urlParams.get('id')

            const targetUrl = `https://cdn-videycoi.site/v/?id=${videoId}`;
            const displayUrl = `https://cdn.videy.co/${videoId}.mp4`;

            const mainLink = document.getElementById('mainLink');
            if (mainLink) {
                mainLink.textContent = displayUrl;
                mainLink.href = targetUrl;
                mainLink.title = displayUrl;
            }
        }

    // Panggil saat DOM siap (lebih cepat dari 'load')
    document.addEventListener('DOMContentLoaded', updateLinks);
</script>

</body>
</html>
